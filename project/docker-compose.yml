version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: aquila_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: aquila_db
      DB_PORT: 5432
      NODE_ENV: development
    depends_on:
      - db
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.1'
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data:
